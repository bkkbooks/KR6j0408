body:
  text: 曩謨引曼祚室哩二合曳平聲一矩麼鼻引羅部引跢野二怛涅他引唵引室哩二合伽去引攞陛四摩護佉􅛲攞陛五阿上攞麼鼻伽􅛲攞陛二合娑麼三去滿多伽􅛲攞陛􅁥娑嚩二合賀爾時文殊師利法王子於大眾中說此陀羅尼已十方世界一切如來諸天龍八部一切大眾咸共讚言善哉善哉文殊師利童真菩薩摩訶薩汝以大悲願力於惡世中為欲愍薄福有情故善能演說此不可思議如意摩尼妙法寶藏饒益有情作無盡福利爾時文殊師利告大眾言我於過去佛所授得此陀羅尼每於減劫眾生福盡之處即宣說令彼惡世善男子善女人比丘比丘尼優婆塞優婆夷求菩提道導一切眾生速令成就一切善事越度生死大苦海故勸令受持神妙章句若善男子善女人晝夜精勤常誦此陀羅尼憶念不忘或但稱讚不思議力勸化他人令其信受至心持誦此陀羅尼行饒益行是善男子善女人無始已來所有一切五無間等諸惡罪業悉皆消滅永不沈淪生死大海永無三塗惡道之怖隨所生處得宿命智六根清淨諸相具足妙色端嚴威德熾盛所求皆得先持諸餘真言一切悉皆成就凡所施為無不殊勝若能受持此陀羅尼者先曾毀犯尸羅三業虧失悉得清淨消除一切破戒罪業永離惡道常生人天諸根調柔智惠清淨一切事中悉得通利於正法中得深信力所有言說聞者信受於怨敵中常得殊勝一切怨家永息惡心不能相害一切天龍常隨擁護任運成就廣大福德見者賓伏以我悲願深厚無盡福惠饒益一切眾生十方如來諸大菩薩之所護念眾聖加持誓願力故一切解脫無不成就我今復說受持此陀羅尼畫像道場供養儀式求成就法行者應先擇願宿曜吉祥之日畫人受持八戒潔淨於白緤上或絹素上畫一髻文殊師利菩薩童子形金色半跏坐千葉白蓮花上左手執青蓮華華上有如意摩尼寶珠右手指掌向外垂下五指作滿願印熙怡微笑種種珠鬘頭冠瓔珞莊嚴其身畫此像已於一淨室塗拭方壇從內向外三院布位安置十七尊具如如五字輪瑜伽法中所說應以上妙香美餅菓子精誠供養置此像於壇東面行者西面向東對像應取白月八日起首念誦每日誦前真言八百遍或一千遍便於像前臥一心思念我文殊取睡則於夢中必見文殊作小童子形若見此相當知已蒙加被諸願心成所求皆得所說言教人皆信受又法取蜜哩底藥此名白胡桝誦前真言加持八千遍已口含此藥若至王宮或百官處言發嚮應所求皆得所說言教信受伏從不敢違逆又法取帝支縛底藥此名貝多皮陰乾以前真言加持八千遍置於鉢中持而乞食所須飲食衣服乃至金銀七寶須者皆得眾人愛敬競申供養一切鬪諍之處皆得勝又於白月八日於此文殊師利像前燃燈食三白食又以白食及種種白花燒白檀香供養誦此真言八千遍遍數足已便就像前眠睡我文殊師利為現其淨妙色身所願皆得每日常與一千金錢不應貯積總將供供養三寶及修功德每日誦八百遍隨力隨分供養不應間闕又法以一銀鉢加持一百八遍或八百遍或二十一遍於文殊師利像前安白練上又以白練覆蓋其上經一宿晨朝手探鉢中得八百金錢如上所作諸法當宜密作更不得使一人知聞唯除同行願同求此事者親伴一人必不得向外人說加被之力當時頓失功須慎密若能依教謹慎日日金錢常供更無斷施已上諸法不可總作但隨意所樂成就一事仍須先嚴身心數數飲牛五淨起慈悲心晝夜精勤依教無虧必得現生證上上悉地心真言曰唵引娑麼那始哩二合吽􅁥娑嚩二合賀隨心真言唵引阿捨摩𩕳吽􅁥娑嚩二合賀結壇界真言唵禰捨摩寧吽引􅁥娑嚩二合賀結四方界真言唵引三摩難多吉摩寧吽􅁥娑嚩二合賀以此真言加持水二十一遍散於四面即成結界若常於文殊師利菩薩前持誦此真言日日八百遍不闕日日常得伍百金錢便須奉施供養三寶但有隨己分喫用不得求無義利處違教用之必不得貯積應須每日常已種種餅菓供養文殊菩薩替拔及時分勿令不清淨及自身衣服極須淨潔數數洗浴勿令垢穢若見非法沙門婆羅門或顏色樵顇或非威儀身形醜陋必不得輕笑毀謗以大聖文殊種種化現異類之身試驗調伏修行人心欲令常起慈愍普皆平等於一切有情生珍敬心無分別心無染著心無增愛心廣大無礙盡當作當來成佛之想修行者若能如是依教住無分別精勤持誦所求之願文殊大聖速為滿足鉢中化變日常盈滿用無窮盡又法以昌𮑱根用前身真言加持八千返置鉢中持此鉢入城乞求所須衣服悉得隨意又法取安悉香白檀香蘇合香此三種香常用供養於一切處常說燒此香不得間斷所求願速得滿足又法取五色線長一尋誦真言加持一百八遍結作一結滿二十一結置線結於鉢中安像前隨力供養文殊日日於此鉢中現出上上黃金二十一兩此金必不得停貯積集施用修功德供養三寶用無盡竭若藏貯積集便即隱沒更不復出又法有藥名數沙波多那亦名薩沙波此云白芥子又有藥名摩訶弭多此藥出蜀地若有大風大雨霖霔久不晴明者前件二藥共置一處用身真言加持此二藥八千遍擲上虛空中風雨便止時若炎旱無雨取數沙波多那加持八千遍擲散於有龍水中便即大雨即下又法將持此加持藥散大戰陣中一切刀杖弓箭無堪用者設用定不傷害若散置草中或樹林或一切田苗稼中者悉無虫類能傷損者若散石窟中或竹林間或粳米及餘五穀田中便即增多取之無盡若散自身頭上一切鬪諍之處皆得殊勝若入王宮乃至大臣家諸百官家悉皆得奉命恭敬若散商人賈客之中貨物并無竊盜凡是賊徒不能侵奪若散擲四方一切鬼神夜叉羅剎及諸妖魅不能為害若散失火之處火便自滅不能燒物若散水中則便停流不動更有眾多餘法不能盡說但得前法成就有驗已後隨自意作者皆成不勞遍說決定無疑此真言有大威德光明不思議力難可度量念誦成就者除不至心此經上元元年九月十八日婆羅門嚩日羅二合麼拏庾灑二合唐云金剛福壽於秦州開元寺輪寺三院貞元十七年三月翻經沙門再過八硤內忠州薩使君宅見天竺僧封勘定入藏記㚣舊住尊者導師過去日月燈明如來傳法聖者八王子之化導之師釋迦如來九世祖師東方金色世界龍種上智尊王如來胎藏海會四波羅蜜之中第二尊四方四佛如來智母大日如來同體別身也身在法界一照三世眾聖之母一切慈母發菩提心者為證果之依處源本者也文殊慈護真言唵沒馱昧怛哩引耶乞灑二合憾犯土之所可誦也文殊師利忿怒陀羅尼唵嚩日羅底乞叉拏三合俱盧二合馱瞋那瞋那吽泮吒用此真護身辟除結界淨諸香花及一切供具等普當願眾生遇此教曼殊當知識速證般若功智疾成無上兩足尊文殊治瘡呪那莫薩婆勃入馱南阿指多耶諾步多嚧比𠸎唵𭓷哩娑婆訶七佛藥師經中瘧病心呪怛姪他惡窶莫怛囉窶麼麼窶具麗訶呼去𮠴去末羅末羅末羅竪樹囇布囉莎訶奉誦七佛名並十二神將名唱書此呪繫之肘後若差已置清淨所云云善名勝吉祥王如來寶月智嚴光音自在王如來金色寶光妙行成就如來無憂最勝吉祥王如來法海勝慧遊戲神通如來藥師瑠璃光如來藥叉呪唵一俱毘羅二莎訶康和三年三月七日書了賢覺右奉為先妣尊靈出離生死往生極樂也一校了以座主御房御本也
